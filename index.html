<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Absensi Calsub.id</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #050505; color: #ffffff; overflow-x: hidden; }
        .cyber-grid {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-size: 40px 40px;
            background-image: linear-gradient(to right, rgba(255, 255, 255, 0.03) 1px, transparent 1px), linear-gradient(to bottom, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            mask-image: radial-gradient(circle at center, black 40%, transparent 90%);
            z-index: -1;
        }
        .glass-card { background: rgba(20, 20, 20, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-glow:hover { box-shadow: 0 0 20px rgba(255, 255, 255, 0.3); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">
    <div class="cyber-grid"></div>

    <img src="https://raw.githubusercontent.com/umartaufik15m/Absensi-Calsub/refs/heads/main/W%20CALSUB_page-0001.jpg" alt="Calsub Logo" class="w-48 mb-6 drop-shadow-xl">

    <div id="app" class="glass-card p-8 rounded-[2rem] w-full max-w-md shadow-2xl transition-all duration-500">
        
        <div id="login-section">
            <h2 class="text-center text-lg font-semibold mb-6 tracking-widest text-gray-400">LOG IN PEGAWAI</h2>
            <div class="space-y-4 mb-6">
                <input type="text" id="emp-id" placeholder="ID KARYAWAN" class="w-full p-4 bg-black/40 border border-white/10 rounded-2xl text-center focus:border-white/40 transition-all outline-none">
                <input type="password" id="emp-pin" placeholder="PIN 4 ANGKA" class="w-full p-4 bg-black/40 border border-white/10 rounded-2xl text-center tracking-[0.8em] focus:border-white/40 transition-all outline-none">
            </div>
            <button onclick="handleLogin()" class="w-full bg-white text-black font-extrabold py-4 rounded-2xl btn-glow transition-all active:scale-95">MASUK SISTEM</button>
        </div>

        <div id="action-section" class="hidden text-center">
            <h2 id="greeting" class="text-2xl font-bold mb-1">Halo, Tim Calsub</h2>
            <p class="text-gray-500 text-sm mb-6">Siap beraksi di Bulak Kapal hari ini?</p>
            
            <div class="relative rounded-3xl overflow-hidden mb-6 h-48 bg-black border border-white/10">
                <video id="video" class="w-full h-full object-cover" autoplay playsinline></video>
                <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent"></div>
            </div>

            <button onclick="submitAbsen('masuk')" class="w-full border-2 border-white/20 hover:border-white/60 text-white font-bold py-4 rounded-2xl mb-4 transition-all">ABSEN MASUK</button>
            
            <div class="pt-6 border-t border-white/10">
                <input type="number" id="prod-total" placeholder="Total Produksi (Pcs)" class="w-full p-4 bg-black/40 border border-white/10 rounded-2xl text-center mb-4 outline-none">
                <label class="flex items-center justify-center space-x-3 mb-6 cursor-pointer">
                    <input type="checkbox" id="is-ot" class="w-5 h-5 accent-white">
                    <span class="text-sm">Saya Kerja Lembur</span>
                </label>
                <button onclick="submitAbsen('pulang')" class="w-full bg-white text-black font-extrabold py-4 rounded-2xl btn-glow transition-all">ABSEN PULANG & LAPOR</button>
            </div>
        </div>
        <p id="notif" class="mt-4 text-center text-xs font-medium"></p>
    </div>

    <script>
        const SB_URL = 'https://wcjzperckywcskcrhgrv.supabase.co';
        const SB_KEY = 'sb_publishable_BQmfryY0U4OMSuw7g2M7CA_WR5fdO5L';
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        const WORKSHOP_LOC = { lat: -6.2510688, lng: 107.0253873 };
        let activeUser = null;

        async function handleLogin() {
            const id = document.getElementById('emp-id').value;
            const pin = document.getElementById('emp-pin').value;
            
            const { data, error } = await supabaseClient.from('profiles').select('*').eq('employee_id', id).eq('pin', pin).single();

            if (error || !data) {
                document.getElementById('notif').innerText = "ID atau PIN salah!";
                document.getElementById('notif').className = "mt-4 text-center text-xs text-red-500";
                return;
            }

            activeUser = data;
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('action-section').classList.remove('hidden');
            document.getElementById('greeting').innerText = "Halo, " + data.name;
            startCam();
        }

        async function startCam() {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            document.getElementById('video').srcObject = stream;
        }

        async function submitAbsen(tipe) {
            document.getElementById('notif').innerText = "Memproses...";
            
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const prod = document.getElementById('prod-total').value || 0;
                const ot = document.getElementById('is-ot').checked;

                const { error } = await supabaseClient.from('attendance').insert([{
                    employee_id: activeUser.employee_id,
                    employee_name: activeUser.name,
                    status: tipe,
                    location: `${pos.coords.latitude},${pos.coords.longitude}`,
                    production_total: parseInt(prod),
                    is_overtime: ot
                }]);

                if (!error) {
                    alert(`Berhasil ${tipe}!`);
                    location.reload();
                } else {
                    alert("Gagal koneksi database.");
                }
            });
        }
    </script>
</body>
</html>
